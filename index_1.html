<style>
:root{
  --navy:#221B57; --navy2:#2E2570; --pur:#5B4FE0; --lpur:#EDEBFC;
  --gold:#C98A24; --ink:#221B57; --muted:#726F86; --line:#E7E5F0;
  --cream:#F6F4EF; --bg1:#1B1547; --bg2:#4A3FA0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:radial-gradient(120% 90% at 50% -10%, #4A3FA0 0%, #1B1547 60%);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px;}
.caption{color:#EEEDFE;text-align:center;margin-bottom:16px;max-width:360px;}
.caption .eyebrow{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:#B9B2F0;margin-bottom:7px;font-weight:600;}
.caption h1{font-family:'Fraunces',serif;font-size:24px;font-weight:600;margin-bottom:6px;letter-spacing:-.3px;line-height:1.1;}
.caption p{font-size:12px;opacity:.82;line-height:1.5;}
.hint{color:#C9C4F0;font-size:11px;margin-top:16px;text-align:center;opacity:.85;}
button{font-family:inherit;}
.phone-wrap{display:flex;justify-content:center;padding:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:44px;backdrop-filter:blur(4px);}
.phone{width:330px;height:660px;background:#fff;border:9px solid #17123B;border-radius:40px;overflow:hidden;position:relative;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(12,8,40,.5), inset 0 0 0 1px rgba(255,255,255,.06);}
.notch{height:26px;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.notch>div{width:70px;height:5px;background:#5B4FE0;border-radius:3px;opacity:.7;}
#screen{flex:1;overflow-y:auto;overflow-x:hidden;background:#fff;}
#screen::-webkit-scrollbar{width:0;}
.tabbar{display:flex;border-top:1px solid var(--line);background:#fff;flex-shrink:0;padding-bottom:2px;}
.tab{flex:1;border:none;background:none;padding:9px 0 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9.5px;font-weight:600;color:#A6A3B8;letter-spacing:.2px;transition:color .15s;}
.tab.on{color:var(--pur);}
.tab .ic{transition:transform .15s;}
.tab.on .ic{transform:translateY(-1px);}
/* fade-in for screens */
.fade{animation:fade .28s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
@media (prefers-reduced-motion:reduce){.fade{animation:none;}}
</style></head><body>

      +'<div style="position:absolute;inset:0;background:linear-gradient(to right,rgba(34,27,87,.6),rgba(34,27,87,.05));"></div>'
      +'<div style="position:absolute;bottom:8px;left:15px;color:#fff;"><div style="font-family:\'Fraunces\',serif;font-size:14px;font-weight:600;">¡Nos renovamos!</div>'
      +'<div style="font-size:9.5px;opacity:.9;">Botella 330 ml · S/ 10 · recojo o envío</div></div></div>';
    h+=title("Catálogo","Compra directa. Envío en Huancayo o recojo en el local.");
    h+='<div style="padding:8px 15px 6px;display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
    beers.forEach(function(b,idx){
      h+='<div style="border:1px solid '+LINE+';border-radius:13px;overflow:hidden;background:#fff;">'
        +'<div style="height:92px;background:linear-gradient(160deg,'+b.c+'26,'+b.c+'0A);position:relative;overflow:hidden;">'
        +'<img src="'+b.img+'" style="width:100%;height:100%;object-fit:cover;"/>'
        +'<div style="position:absolute;top:6px;left:6px;background:rgba(255,255,255,.92);color:'+NAVY+';font-size:8px;font-weight:600;padding:2px 6px;border-radius:6px;">'+b.fam+'</div></div>'
        +'<div style="padding:9px;"><div style="font-weight:700;font-size:12px;color:'+NAVY+';line-height:1.15;">'+b.n+'</div>'
        +'<div style="font-size:8.5px;color:'+MUTED+';margin-top:2px;">'+b.abv+'% · '+b.ibu+' IBU</div>'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-top:7px;"><span style="font-size:13px;font-weight:700;color:'+NAVY+';">S/ '+b.p+'</span>'
        +'<button class="add" data-i="'+idx+'" style="border:none;background:'+PUR+';color:#fff;width:26px;height:26px;border-radius:8px;cursor:pointer;font-size:16px;line-height:1;box-shadow:0 2px 6px '+PUR+'55;">+</button></div></div></div>';
    });
    h+='</div>';
    var count=cart.reduce(function(a,c){return a+c.q;},0), total=cart.reduce(function(a,c){return a+c.q*beers[c.i].p;},0);
    h+='<div style="height:'+(count>0?70:14)+'px;"></div>';
    h+='</div>';
    if(count>0){
      h+='<div style="position:sticky;bottom:0;background:#fff;border-top:1px solid '+LINE+';padding:11px 15px;box-shadow:0 -4px 16px rgba(34,27,87,.08);">'
        +'<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px;"><span style="color:'+MUTED+';">'+count+' producto(s)</span><span style="font-weight:700;color:'+NAVY+';">S/ '+total+'</span></div>'
        +'<button id="checkout" style="width:100%;border:none;background:'+NAVY+';color:#fff;padding:12px;border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;">Ir a pagar</button></div>';
    }
    screen.innerHTML=h;
    document.querySelectorAll(".add").forEach(function(btn){btn.onclick=function(){var i=+btn.dataset.i;var e=cart.find(function(c){return c.i===i;});if(e)e.q++;else cart.push({i:i,q:1});renderVender();};});
    var co=document.getElementById("checkout");if(co)co.onclick=renderPago;
  }

  function renderPago(){
    var total=cart.reduce(function(a,c){return a+c.q*beers[c.i].p;},0);
    var h='<div class="fade">'+header("Pago");
    h+='<div style="padding:14px 15px;">';
    h+='<button id="back" style="border:none;background:none;color:'+PUR+';font-size:12px;font-weight:500;cursor:pointer;padding:0;margin-bottom:12px;display:flex;align-items:center;gap:4px;">‹ Volver al catálogo</button>';
    h+='<div style="border:1px solid '+LINE+';border-radius:13px;padding:12px;margin-bottom:13px;">';
    cart.forEach(function(c){h+='<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px;color:'+NAVY+';"><span>'+beers[c.i].n+' ×'+c.q+'</span><span>S/ '+(c.q*beers[c.i].p)+'</span></div>';});
    h+='<div style="display:flex;justify-content:space-between;font-size:11.5px;color:'+MUTED+';border-top:1px solid '+LINE+';padding-top:7px;margin-top:5px;"><span>Envío (Huancayo)</span><span>S/ 5</span></div>';
    h+='<div style="display:flex;justify-content:space-between;font-size:15px;font-weight:700;margin-top:7px;color:'+NAVY+';"><span>Total</span><span>S/ '+(total+5)+'</span></div></div>';
    h+='<div style="font-size:12px;font-weight:600;margin-bottom:9px;color:'+NAVY+';">Método de pago</div>';
    var pays=[["Yape","#742284"],["Plin","#0AA5A0"],["Tarjeta","#221B57"],["Transferencia","#5F5E5A"]];
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">';
    pays.forEach(function(p,idx){h+='<button class="pay" data-p="'+idx+'" style="border:1px solid #D9D6E6;background:transparent;padding:12px;border-radius:11px;cursor:pointer;font-size:12px;font-weight:600;color:'+p[1]+';transition:all .12s;">'+p[0]+'</button>';});
    h+='</div>';
    h+='<button id="confirm" style="width:100%;border:none;background:'+PUR+';color:#fff;padding:12px;border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px '+PUR+'44;">Confirmar pedido</button></div></div>';
    screen.innerHTML=h;
    document.getElementById("back").onclick=renderVender;
    var sel=-1;
    document.querySelectorAll(".pay").forEach(function(b){b.onclick=function(){sel=+b.dataset.p;document.querySelectorAll(".pay").forEach(function(x){x.style.borderColor="#D9D6E6";x.style.background="transparent";});b.style.borderColor=PUR;b.style.background=LPUR;};});
    document.getElementById("confirm").onclick=function(){if(sel<0){alert("Elige un método de pago");return;}cart=[];renderOk("¡Pedido confirmado!","Te avisamos por WhatsApp cuando esté listo. Salud con identidad wanka. Shapish shay.","vender");};
  }

  /* ---------- VIVIR ---------- */
  function renderVivir(){
    var h='<div class="fade">'+header("Turismo vivencial");
    h+='<div style="position:relative;"><img src="'+IMG.local+'" style="width:100%;height:126px;object-fit:cover;display:block;"/>'
      +'<div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(34,27,87,.9),rgba(34,27,87,.1));"></div>'
      +'<div style="position:absolute;bottom:10px;left:15px;right:15px;color:#fff;">'
      +'<div style="font-family:\'Fraunces\',serif;font-size:16px;font-weight:600;">Planta cervecera &amp; Beer Garden</div>'
      +'<div style="font-size:10px;opacity:.92;margin-top:1px;">Chupaca · a orillas del río Cunas</div></div></div>';
    h+='<div style="padding:14px 15px 6px;"><div style="font-size:11.5px;color:'+MUTED+';line-height:1.5;margin-bottom:13px;">Elige tu experiencia: cada pack combina la visita guiada con cata, parrillas y cervezas de la casa.</div>';
    h+='<div style="font-size:12px;font-weight:600;margin-bottom:9px;color:'+NAVY+';">Elige tu pack</div>';
    PACKS.forEach(function(p,idx){
      var sel=booking.pack===idx;
      h+='<div class="pack" data-p="'+idx+'" style="border:1.5px solid '+(sel?PUR:LINE)+';background:'+(sel?LPUR:"#fff")+';border-radius:14px;padding:12px;margin-bottom:10px;cursor:pointer;position:relative;transition:all .12s;">';
      if(p.tag)h+='<div style="position:absolute;top:-9px;right:12px;background:'+p.tagc+';color:#fff;font-size:9px;font-weight:600;padding:3px 9px;border-radius:9px;letter-spacing:.3px;">'+p.tag+'</div>';
      h+='<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;"><span style="font-family:\'Fraunces\',serif;font-size:15px;font-weight:600;color:'+NAVY+';">'+p.n+'</span><span style="font-size:14px;font-weight:700;color:'+PUR+';">S/ '+p.p+'</span></div>';
      h+='<div style="font-size:9.5px;color:'+GOLD+';font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;">'+p.sub+'</div>';
      h+='<div style="font-size:10.5px;color:'+MUTED+';line-height:1.5;">'+p.d+'</div></div>';
    });
    h+='<div style="font-size:12px;font-weight:600;margin:14px 0 9px;color:'+NAVY+';">Elige la fecha</div>';
    var days=["Vie 18","Sáb 19","Dom 20","Sáb 26"];
    h+='<div style="display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;">';
    days.forEach(function(d){h+='<button class="day" data-d="'+d+'" style="border:1px solid '+(booking.date===d?PUR:"#D9D6E6")+';background:'+(booking.date===d?LPUR:"transparent")+';color:'+(booking.date===d?NAVY:MUTED)+';font-size:11px;font-weight:'+(booking.date===d?"600":"400")+';padding:8px 13px;border-radius:10px;cursor:pointer;transition:all .12s;">'+d+'</button>';});
    h+='</div>';
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;"><span style="font-size:12px;font-weight:600;color:'+NAVY+';">Visitantes</span><div style="display:flex;align-items:center;gap:14px;"><button id="minus" style="border:1px solid #D9D6E6;background:none;width:30px;height:30px;border-radius:9px;cursor:pointer;font-size:16px;color:'+NAVY+';">−</button><span style="font-size:15px;font-weight:700;min-width:20px;text-align:center;color:'+NAVY+';">'+booking.people+'</span><button id="plus" style="border:1px solid #D9D6E6;background:none;width:30px;height:30px;border-radius:9px;cursor:pointer;font-size:16px;color:'+NAVY+';">+</button></div></div>';
    var pk=PACKS[booking.pack];
    h+='<div style="background:'+NAVY+';border-radius:13px;padding:12px 13px;margin-bottom:12px;color:#fff;"><div style="display:flex;justify-content:space-between;font-size:10px;opacity:.8;margin-bottom:4px;"><span>'+pk.n+' × '+booking.people+'</span><span>S/ '+(pk.p*booking.people)+'</span></div><div style="display:flex;justify-content:space-between;font-size:16px;font-weight:700;"><span>Total</span><span>S/ '+(pk.p*booking.people)+'</span></div></div>';
    h+='<button id="reservar" style="width:100%;border:none;background:'+PUR+';color:#fff;padding:12px;border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px '+PUR+'44;">Reservar '+pk.n+'</button>';
    h+='<div style="height:12px;"></div></div></div>';
    screen.innerHTML=h;
    bind(".pack","p",function(v){booking.pack=+v;renderVivir();});
    bind(".day","d",function(v){booking.date=v;renderVivir();});
    document.getElementById("minus").onclick=function(){if(booking.people>1)booking.people--;renderVivir();};
    document.getElementById("plus").onclick=function(){if(booking.people<10)booking.people++;renderVivir();};
    document.getElementById("reservar").onclick=function(){if(!booking.date){alert("Elige una fecha");return;}var pk=PACKS[booking.pack];renderOk("¡Reserva confirmada!",pk.n+" · "+booking.people+" persona(s) · "+booking.date+". Te esperamos junto al río Cunas para vivir la experiencia Wayayo.","vivir");};
  }

  function renderOk(t,s,back){
    var h='<div class="fade" style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;text-align:center;background:linear-gradient(160deg,#fff,#F6F4FF);">';
    h+='<div style="width:64px;height:64px;border-radius:50%;background:'+LPUR+';display:flex;align-items:center;justify-content:center;margin-bottom:18px;color:'+PUR+';"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg></div>';
    h+='<div style="font-family:\'Fraunces\',serif;font-size:19px;font-weight:600;margin-bottom:8px;color:'+NAVY+';">'+t+'</div>';
    h+='<div style="font-size:12px;color:'+MUTED+';line-height:1.6;margin-bottom:24px;max-width:240px;">'+s+'</div>';
    h+='<button id="done" style="border:1px solid #D9D6E6;background:none;padding:10px 22px;border-radius:11px;cursor:pointer;font-size:12px;font-weight:500;color:'+NAVY+';">Volver</button></div>';
    screen.innerHTML=h;
    document.getElementById("done").onclick=function(){setTab(back);};
  }

  function bind(cls,attr,fn){document.querySelectorAll(cls).forEach(function(b){b.onclick=function(){fn(b.dataset[attr]);};});}
  function setTab(t){
    document.querySelectorAll(".tab").forEach(function(x){x.classList.toggle("on",x.dataset.t===t);});
    if(t==="educar")renderEducar();else if(t==="vender")renderVender();else renderVivir();
  }
  document.querySelectorAll(".tab").forEach(function(x){x.onclick=function(){setTab(x.dataset.t);};});
  setTab("educar");
})();
</script>
</body></html>
