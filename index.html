    h+='<div style="border:0.5px solid #E3E1EC;border-radius:11px;padding:11px;margin-bottom:12px;">';
    cart.forEach(function(c){h+='<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;"><span>'+beers[c.i].n+' \u00d7'+c.q+'</span><span>S/ '+(c.q*beers[c.i].p)+'</span></div>';});
    h+='<div style="display:flex;justify-content:space-between;font-size:12px;color:#6B6879;border-top:0.5px solid #E3E1EC;padding-top:6px;margin-top:6px;"><span>Env\u00edo (Huancayo)</span><span>S/ 5</span></div>';
    h+='<div style="display:flex;justify-content:space-between;font-size:14px;font-weight:600;margin-top:6px;color:'+NAVY+';"><span>Total</span><span>S/ '+(total+5)+'</span></div></div>';
    h+='<div style="font-size:12px;font-weight:600;margin-bottom:8px;color:'+NAVY+';">M\u00e9todo de pago</div>';
    var pays=[["Yape","#742284"],["Plin","#00A3A0"],["Tarjeta","#26215C"],["Transferencia","#5F5E5A"]];
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;">';
    pays.forEach(function(p,idx){h+='<button class="pay" data-p="'+idx+'" style="border:0.5px solid #D3D1C7;background:transparent;padding:11px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:600;color:'+p[1]+';">'+p[0]+'</button>';});
    h+='</div>';
    h+='<button id="confirm" style="width:100%;border:none;background:'+PUR+';color:#fff;padding:11px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;">Confirmar pedido</button></div>';
    screen.innerHTML=h;
    document.getElementById("back").onclick=renderVender;
    var sel=-1;
    document.querySelectorAll(".pay").forEach(function(b){b.onclick=function(){sel=+b.dataset.p;document.querySelectorAll(".pay").forEach(function(x){x.style.borderColor="#D3D1C7";x.style.background="transparent";});b.style.borderColor=PUR;b.style.background=LPUR;};});
    document.getElementById("confirm").onclick=function(){if(sel<0){alert("Elige un m\u00e9todo de pago");return;}cart=[];renderOk("\u00a1Pedido confirmado!","Te avisaremos por WhatsApp cuando est\u00e9 listo. Salud con identidad wanka.","vender");};
  }

  function renderVivir(){
    var h=header("Turismo vivencial");
    h+='<div style="position:relative;"><img src="'+IMG.local+'" style="width:100%;height:118px;object-fit:cover;display:block;"/><div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(38,33,92,.78),rgba(38,33,92,.05));"></div><div style="position:absolute;bottom:8px;left:14px;color:#fff;"><div style="font-size:14px;font-weight:600;">Planta de Chupaca</div><div style="font-size:10px;opacity:.9;">A orillas del r\u00edo Cunas</div></div></div>';
    h+='<div style="padding:12px 14px;">';
    h+='<div style="font-size:11px;color:#6B6879;line-height:1.5;margin-bottom:12px;">Elige tu experiencia: cada pack combina la visita guiada con cata, platos y cervezas.</div>';
    h+='<div style="font-size:12px;font-weight:600;margin-bottom:8px;color:'+NAVY+';">Elige tu pack</div>';
    PACKS.forEach(function(p,idx){
      var sel=booking.pack===idx;
      h+='<div class="pack" data-p="'+idx+'" style="border:1px solid '+(sel?PUR:"#E3E1EC")+';background:'+(sel?LPUR:"#fff")+';border-radius:12px;padding:11px;margin-bottom:9px;cursor:pointer;position:relative;">';
      if(p.tag)h+='<div style="position:absolute;top:-8px;right:11px;background:'+p.tagc+';color:#fff;font-size:9px;font-weight:600;padding:2px 8px;border-radius:8px;">'+p.tag+'</div>';
      h+='<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;"><span style="font-size:13px;font-weight:700;color:'+NAVY+';">'+p.n+'</span><span style="font-size:13px;font-weight:700;color:'+PUR+';">S/ '+p.p+'</span></div>';
      h+='<div style="font-size:10px;color:#6B6879;line-height:1.5;">'+p.d+'</div>';
      h+='</div>';
    });
    h+='<div style="font-size:12px;font-weight:600;margin:13px 0 8px;color:'+NAVY+';">Elige la fecha</div>';
    var days=["Vie 18","S\u00e1b 19","Dom 20","S\u00e1b 26"];
    h+='<div style="display:flex;gap:6px;margin-bottom:13px;flex-wrap:wrap;">';
    days.forEach(function(d){h+='<button class="day" data-d="'+d+'" style="border:0.5px solid '+(booking.date===d?PUR:"#D3D1C7")+';background:'+(booking.date===d?LPUR:"transparent")+';color:'+(booking.date===d?"#26215C":"#6B6879")+';font-size:11px;padding:7px 11px;border-radius:9px;cursor:pointer;">'+d+'</button>';});
    h+='</div>';
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;"><span style="font-size:12px;font-weight:600;color:'+NAVY+';">Visitantes</span><div style="display:flex;align-items:center;gap:13px;"><button id="minus" style="border:0.5px solid #D3D1C7;background:none;width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:15px;">\u2212</button><span id="pnum" style="font-size:14px;font-weight:600;min-width:18px;text-align:center;">'+booking.people+'</span><button id="plus" style="border:0.5px solid #D3D1C7;background:none;width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:15px;">+</button></div></div>';
    var pk=PACKS[booking.pack];
    h+='<div style="background:#F4F3F8;border-radius:9px;padding:10px 11px;margin-bottom:11px;"><div style="display:flex;justify-content:space-between;font-size:10px;color:#6B6879;margin-bottom:3px;"><span>'+pk.n+' \u00d7 '+booking.people+'</span><span>S/ '+(pk.p*booking.people)+'</span></div><div style="display:flex;justify-content:space-between;font-size:14px;font-weight:700;color:'+NAVY+';"><span>Total</span><span>S/ '+(pk.p*booking.people)+'</span></div></div>';
    h+='<button id="reservar" style="width:100%;border:none;background:'+NAVY+';color:#fff;padding:11px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;">Reservar '+pk.n+'</button></div>';
    screen.innerHTML=h;
    document.querySelectorAll(".pack").forEach(function(b){b.onclick=function(){booking.pack=+b.dataset.p;renderVivir();};});
    document.querySelectorAll(".day").forEach(function(b){b.onclick=function(){booking.date=b.dataset.d;renderVivir();};});
    document.getElementById("minus").onclick=function(){if(booking.people>1)booking.people--;renderVivir();};
    document.getElementById("plus").onclick=function(){if(booking.people<10)booking.people++;renderVivir();};
    document.getElementById("reservar").onclick=function(){if(!booking.date){alert("Elige una fecha");return;}var pk=PACKS[booking.pack];renderOk("\u00a1Reserva confirmada!",pk.n+" \u00b7 "+booking.people+" persona(s) \u00b7 "+booking.date+". Te esperamos junto al r\u00edo Cunas para vivir la experiencia Wayayo.","vivir");};
  }

  function renderOk(t,s,back){
    var h='<div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;">';
    h+='<div style="width:60px;height:60px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;margin-bottom:16px;"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;display:inline-block;"><path d="M5 12l5 5L20 7"/></svg></div>';
    h+='<div style="font-size:17px;font-weight:600;margin-bottom:7px;color:'+NAVY+';">'+t+'</div>';
    h+='<div style="font-size:12px;color:#6B6879;line-height:1.55;margin-bottom:20px;">'+s+'</div>';
    h+='<button id="done" style="border:0.5px solid #D3D1C7;background:none;padding:9px 20px;border-radius:9px;cursor:pointer;font-size:12px;">Volver</button></div>';
    screen.innerHTML=h;
    document.getElementById("done").onclick=function(){setTab(back);};
  }
  function setTab(t){
    document.querySelectorAll(".tab").forEach(function(x){var on=x.dataset.t===t;x.style.color=on?PUR:"#9A97A8";});
    if(t==="educar")renderEducar();else if(t==="vender")renderVender();else renderVivir();
  }
  document.querySelectorAll(".tab").forEach(function(x){x.onclick=function(){setTab(x.dataset.t);};});
  setTab("educar");
})();
</script>
<div class="hint">Toca las pestañas de abajo para recorrer los tres módulos</div>
</body></html>
